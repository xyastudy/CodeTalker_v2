DATA:
  dataset: vocaset
  data_root: ./vocaset/
  wav_path: wav
  vertices_path: vertices_npy
  template_file: templates.pkl
  read_audio: False
  train_subjects: FaceTalk_170728_03272_TA FaceTalk_170904_00128_TA FaceTalk_170725_00137_TA FaceTalk_170915_00223_TA FaceTalk_170811_03274_TA FaceTalk_170913_03279_TA FaceTalk_170904_03276_TA FaceTalk_170912_03278_TA
  val_subjects: FaceTalk_170811_03275_TA FaceTalk_170908_03277_TA
  test_subjects: FaceTalk_170809_00138_TA FaceTalk_170731_00024_TA
  
LOSS:
  quant_loss_weight: 1.0
  loss_zero_weight: 0.05  # 惩罚 decoder 在非目标区域输出非零值（0.01→0.05，加强区域分化信号）

NETWORK:
  arch: stage1_vocaset
  in_dim: 15069
  hidden_size: 1024
  num_hidden_layers: 6       # 编码器 Transformer 层数
  num_attention_heads: 8
  intermediate_size: 2048    # 编码器 FFN 宽度（1536 → 2048，与解码器对齐）
  window_size: 1
  quant_factor: 0
  face_quan_num: 16
  neg: 0.2
  INaffine: False
  # ——— 解码器独立配置（ConformerDecoder） ———
  decoder_num_layers: 6      # Conformer 块数（每块含 ConvModule，能力强于同层数 Transformer）
  decoder_intermediate_size: 2048  # 解码器 FFN 宽度（原来 1536 → 2048）
  conv_kernel_size: 31       # ConvModule 深度可分离卷积核大小

VQuantizer:
  n_embed: 256
  zquant_dim: 64

TRAIN:
  use_sgd: False
  sync_bn: False  # adopt sync_bn or not
  train_gpu: [0]
  workers: 10  # data loader workers
  batch_size: 2  # 双卡最小值=2（单卡也可以用 2）；多卡时每卡 batch = batch_size / n_gpus
  batch_size_val: 1  # batch size for validation during training, memory and speed tradeoff
  base_lr: 0.0001
  StepLR: True
  warmup_steps: 1
  adaptive_lr: False
  factor: 0.3
  patience: 3
  threshold: 0.0001
  poly_lr: False
  epochs: 200
  step_size: 20
  gamma: 0.5
  start_epoch: 0
  power: 0.9
  momentum: 0.9
  weight_decay: 0.002
  manual_seed: 131
  print_freq: 10
  save_freq: 1
  save_path:
#  weight: 
  weight:
  resume:
  evaluate: True  # evaluate on validation set, extra gpu memory needed and small batch_size_val is recommend
  eval_freq: 10

Distributed:
  dist_url: tcp://127.0.0.1:6701
  dist_backend: 'nccl'
  multiprocessing_distributed: True
  world_size: 1
  rank: 0


TEST:
  test_workers: 0
  test_gpu: [0]
  test_batch_size: 1
  save: True
  model_path:
  save_folder:
